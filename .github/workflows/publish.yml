name: Publish Release

on:
  push:
    branches:
      - stable
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: get_version
        run: |
          VERSION=$(sed -n 's/^__version__[[:space:]]*=[[:space:]]*"\(.*\)"/\1/p' rplibs/_version.py)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: tagcheck
        run: |
          if git rev-parse "v${{ steps.get_version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Stop if tag exists
        if: steps.tagcheck.outputs.exists == 'true'
        run: exit 0

      - name: Create tag
        run: |
          git tag v${{ steps.get_version.outputs.version }}
          git push origin v${{ steps.get_version.outputs.version }}

      - name: Create GitHub Release
        uses: actions/create-release@v1
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          release_name: Release v${{ steps.get_version.outputs.version }}
          body_path: CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout stable
        uses: actions/checkout@v4
        with:
          ref: stable
          fetch-depth: 0
    
      - name: Sync stable → main
        id: sync
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          branch: sync-stable-to-main
          title: "Sync stable → main"
          body: "Automated sync after release"
          delete-branch: true

      - name: Enable auto-merge
        if: steps.sync.outputs.pull-request-number != ''
        run: |
            gh pr merge ${{ steps.sync.outputs.pull-request-number }} --auto --merge
        env:
            GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
