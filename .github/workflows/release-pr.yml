name: Create Release PR

on:
  push:
    branches:
      - stable

jobs:
  release-pr:
    if: "!startsWith(github.event.head_commit.message, 'chore(release):')"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate next tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v5.6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          release_branches: stable
          tag_prefix: v

      - name: Generate CHANGELOG
        run: |
          gem install github_changelog_generator
          AUTH=$(echo $GITHUB_REPOSITORY | sed -e 's/\// /g' | awk '{print "--user " $1 " --project " $2}')
          github_changelog_generator $AUTH --no-unreleased

      - name: Update version file
        run: |
          folder=$(dirname $(find . -name _version.py))
          echo "__version__ = \"${{ steps.tag_version.outputs.new_tag }}\"" > $folder/_version.py

      - name: Create Release PR
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: release/${{ steps.tag_version.outputs.new_tag }}
          commit-message: "chore(release): bump to ${{ steps.tag_version.outputs.new_tag }}"
          title: "Release ${{ steps.tag_version.outputs.new_tag }}"
          body: "Automated release PR"
          base: stable