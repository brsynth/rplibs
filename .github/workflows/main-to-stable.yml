name: Auto PR main → stable

on:
  push:
    branches:
      - main

jobs:
  pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create PR
        run: |
          gh pr create \
            --base stable \
            --head main \
            --title "Sync main → stable" \
            --body "Automated PR after push to main"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}